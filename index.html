<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      background: #111111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    @media (min-width: 800px) {
      .chat-container {
        height: 92vh;
        max-height: 860px;
        border-radius: 20px;
        border: 1px solid #222;
        box-shadow: 0 0 60px rgba(0,0,0,0.6);
      }
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #111111;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #c9b800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #0a0a0a;
      font-weight: 900;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.02em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reset-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .reset-btn:hover {
      border-color: #c9b800;
      color: #c9b800;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.6);
    }

    /* ── Welcome Screen ── */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    .welcome-screen.hidden { display: none; }

    .orb {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #e8d400, #a08c00 55%, #3a3000);
      box-shadow:
        0 0 40px rgba(201,184,0,0.45),
        0 0 80px rgba(201,184,0,0.2),
        inset 0 0 30px rgba(255,255,255,0.08);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(201,184,0,0.45), 0 0 80px rgba(201,184,0,0.2); }
      50%       { box-shadow: 0 0 60px rgba(201,184,0,0.65), 0 0 110px rgba(201,184,0,0.3); }
    }

    .welcome-text {
      text-align: center;
    }

    .welcome-text h2 {
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .welcome-text h2 span { color: #c9b800; }

    .welcome-text p {
      font-size: 14px;
      color: #666;
    }

    .feature-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 680px;
    }

    .feature-card {
      flex: 1;
      min-width: 160px;
      background: #1a1a1a;
      border: 1px solid #242424;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .feature-card:hover {
      border-color: #c9b800;
      transform: translateY(-2px);
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .feature-card h4 {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .feature-card p {
      font-size: 11px;
      color: #555;
      line-height: 1.4;
    }

    /* ── Chat Box ── */
    .chat-box {
      flex: 1;
      padding: 20px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .chat-box.hidden { display: none; }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }

    /* ── Message Row ── */
    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 74%;
      gap: 4px;
      animation: slideIn 0.2s ease-out both;
    }

    .message-row.user { align-self: flex-end; align-items: flex-end; }
    .message-row.bot  { align-self: flex-start; align-items: flex-start; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bot-row-inner { display: flex; align-items: flex-end; gap: 8px; }

    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c9b800, #7a7000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: #c9b800;
      color: #0a0a0a;
      font-weight: 500;
      border-bottom-right-radius: 4px;
    }

    .message-row.bot .bubble {
      background: #1c1c1c;
      color: #e0e0e0;
      border: 1px solid #272727;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 10px;
      color: #444;
      padding: 0 4px;
    }

    /* ── Typing ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 14px;
    }

    .typing-bubble span {
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #555;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    /* ── Input Area ── */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: #111111;
      border-top: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 12px 18px;
      border: 1.5px solid #222;
      border-radius: 28px;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: #e0e0e0;
      background: #1a1a1a;
      transition: border-color 0.18s;
    }

    .input-area input:focus { border-color: #c9b800; }
    .input-area input::placeholder { color: #444; }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #c9b800;
      color: #0a0a0a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 2px 12px rgba(201,184,0,0.35);
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(201,184,0,0.5);
    }

    .send-btn:active { transform: scale(0.95); }

    .send-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="header-brand">
      <div class="brand-icon">A</div>
      <span class="brand-name">AI Support</span>
    </div>
    <div class="header-right">
      <button class="reset-btn" onclick="goBack()">← Back</button>
      <div class="header-status">
        <span class="status-dot"></span>
        Online
      </div>
    </div>
  </div>

  <!-- Welcome screen (shown until first message) -->
  <div class="welcome-screen" id="welcome-screen">
    <div class="orb"></div>
    <div class="welcome-text">
      <h2>Welcome back, <span>User!</span></h2>
      <p>How can I help you today?</p>
    </div>
    <div class="feature-cards">
      <div class="feature-card" onclick="startChat('How do I get a refund?')">
        <div class="feature-icon">↩</div>
        <h4>Refund Policy</h4>
        <p>Learn about returns and refund eligibility</p>
      </div>
      <div class="feature-card" onclick="startChat('track order')">
        <div class="feature-icon">📦</div>
        <h4>Track Order</h4>
        <p>Check the status of your delivery</p>
      </div>
      <div class="feature-card" onclick="startChat('How long does delivery take?')">
        <div class="feature-icon">🚚</div>
        <h4>Delivery Info</h4>
        <p>Estimated shipping times and options</p>
      </div>
    </div>
  </div>

  <div class="chat-box hidden" id="chat-box"></div>

  <div class="input-area">
    <input id="input" type="text" placeholder="Ask something..." autocomplete="off" />
    <button class="send-btn" id="send-btn" onclick="send()" title="Send">➤</button>
  </div>

</div>

<script>
  const userId = localStorage.getItem("userId") || Date.now().toString();
  localStorage.setItem("userId", userId);

  let chatStarted = false;

  async function goBack() {
    await fetch("https://ai-support-chatbot-ql1c.onrender.com/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId })
    });

    document.getElementById("chat-box").innerHTML = "";
    document.getElementById("chat-box").classList.add("hidden");
    document.getElementById("welcome-screen").classList.remove("hidden");
    chatStarted = false;
  }

  function startChat(msg) {
    document.getElementById("input").value = msg;
    send();
  }

  function fillInput(text) {
    document.getElementById("input").value = text;
    document.getElementById("input").focus();
  }

  function showChat() {
    if (!chatStarted) {
      chatStarted = true;
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("chat-box").classList.remove("hidden");
    }
  }

  document.getElementById("input").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  async function send() {
    const input   = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const message = input.value.trim();

    if (!message) return;

    showChat();
    addMessage(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingRow = addTypingIndicator();

    try {
      const res = await fetch("https://ai-support-chatbot-ql1c.onrender.com/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, userId })
      });

      const data = await res.json();

      setTimeout(() => {
        typingRow.remove();

        const reply = data.reply || "";
        let displayMsg = reply;

        if (reply.toLowerCase().includes("quota") || reply.toLowerCase().includes("resource_exhausted")) {
          displayMsg = "⚠️ Server is busy. Please try again in a few minutes.";
        } else if (reply.toLowerCase().startsWith("error:") || !reply) {
          displayMsg = "Something went wrong. Try again.";
        }

        addMessage(displayMsg, "bot");
        sendBtn.disabled = false;
      }, 800);

    } catch (err) {
      setTimeout(() => {
        typingRow.remove();
        addMessage("Something went wrong. Try again.", "bot");
        sendBtn.disabled = false;
      }, 800);
    }
  }

  function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");
    const timeStr = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const row = document.createElement("div");
    row.classList.add("message-row", sender);

    if (sender === "bot") {
      const inner = document.createElement("div");
      inner.classList.add("bot-row-inner");

      const avatar = document.createElement("div");
      avatar.classList.add("bot-avatar");
      avatar.textContent = "✦";

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;

      inner.appendChild(avatar);
      inner.appendChild(bubble);
      row.appendChild(inner);
    } else {
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;
      row.appendChild(bubble);
    }

    const ts = document.createElement("span");
    ts.classList.add("timestamp");
    ts.textContent = timeStr;
    row.appendChild(ts);

    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    return row;
  }

  function addTypingIndicator() {
    const chatBox = document.getElementById("chat-box");

    const row = document.createElement("div");
    row.classList.add("message-row", "bot");

    const inner = document.createElement("div");
    inner.classList.add("bot-row-inner");

    const avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.textContent = "✦";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble", "typing-bubble");

    for (let i = 0; i < 3; i++) bubble.appendChild(document.createElement("span"));

    inner.appendChild(avatar);
    inner.appendChild(bubble);
    row.appendChild(inner);

    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    return row;
  }
</script>

</body>
</html>
