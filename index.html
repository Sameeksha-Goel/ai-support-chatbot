<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Support</title>
  <style>
    /* ── CSS Variables (dark/light mode) ── */
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --surface3:  #1c1c1c;
      --border:    #1e1e1e;
      --border2:   #272727;
      --text:      #e0e0e0;
      --text-muted:#666;
      --text-dim:  #444;
      --accent:    #c9b800;
      --accent-bg: rgba(201,184,0,0.08);
      --green:     #4ade80;
      --green-bg:  rgba(74,222,128,0.08);
      --shadow:    rgba(0,0,0,0.6);
    }

    [data-theme="light"] {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --surface2:  #f5f5f5;
      --surface3:  #eeeeee;
      --border:    #e0e0e0;
      --border2:   #d0d0d0;
      --text:      #1a1a1a;
      --text-muted:#888;
      --text-dim:  #aaa;
      --accent:    #a89600;
      --accent-bg: rgba(168,150,0,0.08);
      --green:     #16a34a;
      --green-bg:  rgba(22,163,74,0.08);
      --shadow:    rgba(0,0,0,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s;
    }

    .chat-container {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      transition: background 0.3s;
    }

    @media (min-width: 800px) {
      .chat-container {
        height: 92vh;
        max-height: 860px;
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 0 60px var(--shadow);
      }
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-brand { display: flex; align-items: center; gap: 10px; }

    .brand-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #0a0a0a;
    }

    .brand-name { font-size: 16px; font-weight: 700; color: var(--text); }

    .header-center {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      transition: opacity 0.3s;
      opacity: 0;
    }
    .header-center.visible { opacity: 1; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    /* Theme toggle */
    .theme-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    .reset-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--text-muted);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      display: none;
    }
    .reset-btn.visible { display: block; }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    .header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* ── Welcome Screen ── */
    .welcome-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; gap: 24px;
    }
    .welcome-screen.hidden { display: none; }

    .orb {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #e8d400, #a08c00 55%, #3a3000);
      box-shadow: 0 0 40px rgba(201,184,0,0.45), 0 0 80px rgba(201,184,0,0.2), inset 0 0 30px rgba(255,255,255,0.08);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 40px rgba(201,184,0,0.45), 0 0 80px rgba(201,184,0,0.2); }
      50%      { box-shadow: 0 0 60px rgba(201,184,0,0.65), 0 0 110px rgba(201,184,0,0.3); }
    }

    .welcome-text { text-align: center; }
    .welcome-text h2 { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .welcome-text h2 span { color: var(--accent); }
    .welcome-text p { font-size: 14px; color: var(--text-muted); }

    .feature-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 680px; }

    .feature-card {
      flex: 1; min-width: 160px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }
    .feature-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .feature-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface3);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 10px;
    }
    .feature-card h4 { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .feature-card p { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    /* ── Chat Box ── */
    .chat-box {
      flex: 1; padding: 20px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
      scroll-behavior: smooth;
    }
    .chat-box.hidden { display: none; }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

    /* ── Messages ── */
    .message-row {
      display: flex; flex-direction: column;
      max-width: 74%; gap: 4px;
      animation: slideIn 0.2s ease-out both;
    }
    .message-row.user { align-self: flex-end; align-items: flex-end; }
    .message-row.bot  { align-self: flex-start; align-items: flex-start; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bot-row-inner { display: flex; align-items: flex-end; gap: 8px; }

    .bot-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #c9b800, #7a7000);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    .bubble {
      padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.55; word-break: break-word;
    }
    .message-row.user .bubble {
      background: var(--accent); color: #0a0a0a;
      font-weight: 500; border-bottom-right-radius: 4px;
    }
    .message-row.bot .bubble {
      background: var(--surface3); color: var(--text);
      border: 1px solid var(--border2); border-bottom-left-radius: 4px;
    }

    .msg-meta { display: flex; align-items: center; gap: 5px; }

    .timestamp { font-size: 10px; color: var(--text-dim); padding: 0 2px; }

    /* Read receipts */
    .receipt {
      font-size: 11px; color: var(--text-dim);
      transition: color 0.3s;
    }
    .receipt.delivered { color: var(--accent); }

    /* ── Order Card ── */
    .order-card {
      margin-top: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      overflow: hidden;
      font-size: 13px;
      min-width: 240px;
    }

    .order-card-header {
      background: var(--accent);
      color: #0a0a0a;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 13px;
    }

    .order-card-header span {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.75;
      display: block;
      margin-top: 1px;
    }

    .order-card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .order-card-row:last-child { border-bottom: none; }

    .order-card-label {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .order-card-value {
      color: var(--text);
      font-size: 13px;
      text-align: right;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .status-shipped       { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .status-delivered     { background: rgba(74,222,128,0.15); color: #4ade80; }
    .status-processing    { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .status-out           { background: rgba(168,85,247,0.15); color: #c084fc; }
    .status-returned      { background: rgba(255,77,77,0.15);  color: #f87171; }

    /* ── Quick Reply Chips ── */
    .quick-replies {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 4px; align-self: flex-start;
      animation: slideIn 0.2s ease-out both;
    }
    .chip {
      padding: 5px 12px;
      font-size: 12px; font-weight: 500;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Satisfaction Prompt ── */
    .follow-up-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .follow-up-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      border-radius: 20px; border: 1px solid var(--border2);
      background: var(--surface2); color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .follow-up-btn.yes:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .follow-up-btn.no:hover  { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    .close-chat-btn {
      display: inline-block; margin-top: 10px;
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      border-radius: 20px; border: 1px solid var(--green);
      background: var(--green-bg); color: var(--green);
      cursor: pointer; transition: background 0.15s;
    }
    .close-chat-btn:hover { background: rgba(74,222,128,0.16); }

    /* Human handoff banner */
    .handoff-banner {
      margin: 8px 0; padding: 10px 14px;
      background: rgba(201,184,0,0.08);
      border: 1px solid rgba(201,184,0,0.25);
      border-radius: 10px; font-size: 12px;
      color: var(--accent); text-align: center;
      animation: slideIn 0.2s ease-out both;
    }

    /* ── Typing Indicator ── */
    .typing-bubble { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
    .typing-bubble span {
      display: block; width: 6px; height: 6px;
      border-radius: 50%; background: #555;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    /* ── Input Area ── */
    .input-area {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1; padding: 12px 18px;
      border: 1.5px solid var(--border2);
      border-radius: 28px; outline: none;
      font-family: inherit; font-size: 14px;
      color: var(--text); background: var(--surface2);
      transition: border-color 0.18s;
    }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); color: #0a0a0a;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 2px 12px rgba(201,184,0,0.35);
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(201,184,0,0.5); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="header-brand">
      <div class="brand-icon">A</div>
      <span class="brand-name">AI Support</span>
    </div>

    <div class="header-center" id="header-center">AI Support is typing...</div>

    <div class="header-right">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="reset-btn" id="back-btn" onclick="goBack()">← Back</button>
      <div class="header-status">
        <span class="status-dot"></span>
        <span id="status-text">Online</span>
      </div>
    </div>
  </div>

  <div class="welcome-screen" id="welcome-screen">
    <div class="orb"></div>
    <div class="welcome-text">
      <h2>Welcome back, <span>User!</span></h2>
      <p>How can I help you today?</p>
    </div>
    <div class="feature-cards">
      <div class="feature-card" onclick="startChat('How do I get a refund?')">
        <div class="feature-icon">↩</div>
        <h4>Refund Policy</h4>
        <p>Learn about returns and refund eligibility</p>
      </div>
      <div class="feature-card" onclick="startChat('track order')">
        <div class="feature-icon">📦</div>
        <h4>Track Order</h4>
        <p>Check the status of your delivery</p>
      </div>
      <div class="feature-card" onclick="startChat('How long does delivery take?')">
        <div class="feature-icon">🚚</div>
        <h4>Delivery Info</h4>
        <p>Estimated shipping times and options</p>
      </div>
    </div>
  </div>

  <div class="chat-box hidden" id="chat-box"></div>

  <div class="input-area">
    <input id="input" type="text" placeholder="Ask something..." autocomplete="off" />
    <button class="send-btn" id="send-btn" onclick="send()" title="Send">➤</button>
  </div>

</div>

<script>
  const userId = localStorage.getItem("userId") || Date.now().toString();
  localStorage.setItem("userId", userId);

  let chatStarted = false;
  let isDark = localStorage.getItem("theme") !== "light";

  // Apply saved theme
  if (!isDark) {
    document.documentElement.setAttribute("data-theme", "light");
    document.getElementById("theme-btn").textContent = "☀️";
  }

  function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
    document.getElementById("theme-btn").textContent = isDark ? "🌙" : "☀️";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  }

  // ── Quick reply chips per context ──────────────────────────────────────────
  const quickReplies = {
    refund:   ["How long does a refund take?", "Track my order", "Speak to an agent"],
    delivery: ["Track my order", "Change address", "Contact support"],
    order:    ["Check another order", "Refund policy", "Speak to an agent"],
    cancel:   ["Refund policy", "Track my order", "Speak to an agent"],
    default:  ["Track my order", "Refund policy", "Speak to an agent"],
  };

  function getChipContext(msg) {
    const m = msg.toLowerCase();
    if (m.includes("refund") || m.includes("return")) return "refund";
    if (m.includes("delivery") || m.includes("shipping")) return "delivery";
    if (m.includes("order") && (m.includes("status") || m.includes("shipped") || m.includes("arriving"))) return "order";
    if (m.includes("cancel")) return "cancel";
    return "default";
  }

  // ── Typing simulation ──────────────────────────────────────────────────────
  function typeText(element, text, onDone) {
    element.textContent = "";
    let i = 0;
    const speed = Math.max(12, Math.min(30, 1200 / text.length));
    const interval = setInterval(() => {
      element.textContent += text[i++];
      if (i >= text.length) {
        clearInterval(interval);
        if (onDone) onDone();
      }
    }, speed);
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  async function goBack() {
    await fetch("https://ai-support-chatbot-ql1c.onrender.com/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId })
    });
    document.getElementById("chat-box").innerHTML = "";
    document.getElementById("chat-box").classList.add("hidden");
    document.getElementById("welcome-screen").classList.remove("hidden");
    document.getElementById("back-btn").classList.remove("visible");
    chatStarted = false;
  }

  function startChat(msg) {
    document.getElementById("input").value = msg;
    send();
  }

  function showChat() {
    if (!chatStarted) {
      chatStarted = true;
      document.getElementById("welcome-screen").classList.add("hidden");
      document.getElementById("chat-box").classList.remove("hidden");
      document.getElementById("back-btn").classList.add("visible");
    }
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  async function send() {
    const input   = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const message = input.value.trim();
    if (!message) return;

    showChat();
    const userRow = addMessage(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    // Show typing status in header
    document.getElementById("header-center").classList.add("visible");

    const typingRow = addTypingIndicator();

    try {
      const res = await fetch("https://ai-support-chatbot-ql1c.onrender.com/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, userId })
      });
      const data = await res.json();

      setTimeout(() => {
        typingRow.remove();
        document.getElementById("header-center").classList.remove("visible");

        let displayMsg = data.reply || "";
        if (displayMsg.toLowerCase().includes("quota") || displayMsg.toLowerCase().includes("resource_exhausted")) {
          displayMsg = "⚠️ Server is busy. Please try again in a few minutes.";
        } else if (displayMsg.toLowerCase().startsWith("error:") || !displayMsg) {
          displayMsg = "Something went wrong. Try again.";
        }

        // Read receipt: mark as delivered
        const receipt = userRow.querySelector(".receipt");
        if (receipt) receipt.classList.add("delivered");

        // Render order card if present
        if (data.orderCard) {
          addBotMessage(displayMsg, () => {
            renderOrderCard(data.orderCard);
          });
          sendBtn.disabled = false;
          return;
        }

        // Render bot reply with typing simulation
        const botRow = addBotMessage(displayMsg, () => {
          // Quick reply chips after typing finishes
          const skipChips = ["please enter your order", "server is busy", "something went wrong", "notified our support"];
          if (!skipChips.some(s => displayMsg.toLowerCase().includes(s))) {
            addQuickReplies(getChipContext(displayMsg));
          }

          // Satisfaction prompt (skip mid-flow messages)
          const skipFollowUp = ["please enter your order id", "please enter a valid order", "server is busy"];
          if (!skipFollowUp.some(s => displayMsg.toLowerCase().includes(s))) {
            setTimeout(() => addSatisfactionPrompt(), 500);
          }
        });

        // Human handoff banner
        if (data.humanHandoff) {
          const banner = document.createElement("div");
          banner.className = "handoff-banner";
          banner.textContent = "🙋 A support agent has been notified and will reach out shortly.";
          document.getElementById("chat-box").appendChild(banner);
          document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
        }

        sendBtn.disabled = false;
      }, 800);

    } catch (err) {
      setTimeout(() => {
        typingRow.remove();
        document.getElementById("header-center").classList.remove("visible");
        addBotMessage("Something went wrong. Try again.", null);
        sendBtn.disabled = false;
      }, 800);
    }
  }

  // ── Message rendering ──────────────────────────────────────────────────────
  function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");
    const timeStr = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const row = document.createElement("div");
    row.classList.add("message-row", sender);

    if (sender === "bot") {
      const inner = document.createElement("div");
      inner.classList.add("bot-row-inner");
      const avatar = document.createElement("div");
      avatar.classList.add("bot-avatar");
      avatar.textContent = "✦";
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;
      inner.appendChild(avatar);
      inner.appendChild(bubble);
      row.appendChild(inner);
    } else {
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;
      row.appendChild(bubble);
    }

    const meta = document.createElement("div");
    meta.classList.add("msg-meta");
    const ts = document.createElement("span");
    ts.classList.add("timestamp");
    ts.textContent = timeStr;
    meta.appendChild(ts);

    if (sender === "user") {
      const receipt = document.createElement("span");
      receipt.classList.add("receipt");
      receipt.textContent = "✓";
      meta.appendChild(receipt);
    }

    row.appendChild(meta);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
    return row;
  }

  function addBotMessage(text, onDone) {
    const chatBox = document.getElementById("chat-box");
    const timeStr = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const row = document.createElement("div");
    row.classList.add("message-row", "bot");

    const inner = document.createElement("div");
    inner.classList.add("bot-row-inner");
    const avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.textContent = "✦";
    const bubble = document.createElement("div");
    bubble.classList.add("bubble");

    inner.appendChild(avatar);
    inner.appendChild(bubble);
    row.appendChild(inner);

    const meta = document.createElement("div");
    meta.classList.add("msg-meta");
    const ts = document.createElement("span");
    ts.classList.add("timestamp");
    ts.textContent = timeStr;
    meta.appendChild(ts);
    row.appendChild(meta);

    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    typeText(bubble, text, onDone);
    return row;
  }

  // ── Quick reply chips ──────────────────────────────────────────────────────
  function addQuickReplies(context) {
    const chatBox = document.getElementById("chat-box");
    const chips = quickReplies[context] || quickReplies.default;

    const wrap = document.createElement("div");
    wrap.classList.add("quick-replies");

    chips.forEach(label => {
      const chip = document.createElement("button");
      chip.classList.add("chip");
      chip.textContent = label;
      chip.onclick = () => {
        wrap.remove();
        // Remove any open satisfaction prompt
        document.querySelectorAll(".follow-up-btns").forEach(el => el.closest(".message-row")?.remove());
        startChat(label);
      };
      wrap.appendChild(chip);
    });

    chatBox.appendChild(wrap);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // ── Satisfaction prompt ────────────────────────────────────────────────────
  function addSatisfactionPrompt() {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.classList.add("message-row", "bot");

    const inner = document.createElement("div");
    inner.classList.add("bot-row-inner");
    const avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.textContent = "✦";
    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.textContent = "Was that helpful? 😊";

    const btns = document.createElement("div");
    btns.classList.add("follow-up-btns");

    const yesBtn = document.createElement("button");
    yesBtn.classList.add("follow-up-btn", "yes");
    yesBtn.textContent = "Yes, thanks! ✅";
    yesBtn.onclick = () => {
      btns.remove();
      bubble.textContent = "Glad I could help! 😊 This chat session is now closing...";
      chatBox.scrollTop = chatBox.scrollHeight;
      setTimeout(goBack, 2000);
    };

    const noBtn = document.createElement("button");
    noBtn.classList.add("follow-up-btn", "no");
    noBtn.textContent = "No, I need more help ❓";
    noBtn.onclick = () => row.remove();

    btns.appendChild(yesBtn);
    btns.appendChild(noBtn);
    bubble.appendChild(btns);
    inner.appendChild(avatar);
    inner.appendChild(bubble);
    row.appendChild(inner);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // ── Order card ────────────────────────────────────────────────────────────
  function getStatusClass(status) {
    const s = status.toLowerCase();
    if (s.includes("delivered"))        return "status-delivered";
    if (s.includes("out for delivery")) return "status-out";
    if (s.includes("processing"))       return "status-processing";
    if (s.includes("returned"))         return "status-returned";
    return "status-shipped";
  }

  function renderOrderCard(o) {
    const chatBox = document.getElementById("chat-box");

    const row = document.createElement("div");
    row.classList.add("message-row", "bot");
    row.style.maxWidth = "320px";

    const inner = document.createElement("div");
    inner.classList.add("bot-row-inner");

    const avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.textContent = "✦";

    const card = document.createElement("div");
    card.classList.add("order-card");

    const rows = [
      { label: "Status",    value: `<span class="status-badge ${getStatusClass(o.status)}">${o.status}</span>` },
      { label: "Item",      value: `${o.item} × ${o.quantity}` },
      { label: "Price",     value: o.price },
      { label: "Placed",    value: o.placedDate },
      { label: "Shipped",   value: o.shippedDate !== "—" ? `${o.shippedDate} via ${o.carrier}` : "Not yet shipped" },
      { label: "Arriving",  value: o.estimatedDelivery },
      { label: "Tracking",  value: o.trackingNumber !== "—" ? o.trackingNumber : "Not available" },
    ];

    card.innerHTML = `
      <div class="order-card-header">
        Order #${o.orderId}
        <span>${o.item}</span>
      </div>
    `;

    rows.forEach(r => {
      const div = document.createElement("div");
      div.classList.add("order-card-row");
      div.innerHTML = `<span class="order-card-label">${r.label}</span><span class="order-card-value">${r.value}</span>`;
      card.appendChild(div);
    });

    inner.appendChild(avatar);
    inner.appendChild(card);
    row.appendChild(inner);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // ── Typing indicator ───────────────────────────────────────────────────────
  function addTypingIndicator() {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.classList.add("message-row", "bot");
    const inner = document.createElement("div");
    inner.classList.add("bot-row-inner");
    const avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.textContent = "✦";
    const bubble = document.createElement("div");
    bubble.classList.add("bubble", "typing-bubble");
    for (let i = 0; i < 3; i++) bubble.appendChild(document.createElement("span"));
    inner.appendChild(avatar);
    inner.appendChild(bubble);
    row.appendChild(inner);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
    return row;
  }
</script>

</body>
