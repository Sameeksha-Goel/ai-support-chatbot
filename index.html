<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Support Chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      overflow: hidden;
    }

    @media (min-width: 701px) {
      .chat-container {
        height: 92vh;
        max-height: 800px;
        border-radius: 18px;
      }
    }

    /* ── Header ─────────────────────────────────────────────── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #6c63ff 0%, #574fd6 100%);
      color: #ffffff;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      opacity: 0.88;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.35);
    }

    /* ── Message Area ───────────────────────────────────────── */
    .chat-box {
      flex: 1;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar { width: 5px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    /* ── Message Row ────────────────────────────────────────── */
    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 3px;
      animation: slideIn 0.22s ease-out both;
    }

    .message-row.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bot-row-inner {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .bot-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #574fd6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    /* ── Bubble ─────────────────────────────────────────────── */
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: linear-gradient(135deg, #6c63ff 0%, #574fd6 100%);
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .message-row.bot .bubble {
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    /* ── Timestamp ──────────────────────────────────────────── */
    .timestamp {
      font-size: 10px;
      color: #9ca3af;
      padding: 0 4px;
    }

    /* ── Typing Indicator ───────────────────────────────────── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 14px;
    }

    .typing-bubble span {
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-bubble span:nth-child(1) { animation-delay: 0s; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Input Area ─────────────────────────────────────────── */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 24px;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: #1a1a2e;
      background: #f9fafb;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .input-area input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.12);
      background: #ffffff;
    }

    .input-area input::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #574fd6);
      color: #ffffff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 2px 8px rgba(108, 99, 255, 0.35);
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 14px rgba(108, 99, 255, 0.45);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <span class="header-name">AI Support</span>
      <span class="header-status">
        <span class="status-dot"></span>
        Online
      </span>
    </div>
  </div>

  <div class="chat-box" id="chat-box"></div>

  <div class="input-area">
    <input
      id="input"
      type="text"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button class="send-btn" id="send-btn" onclick="send()" title="Send">➤</button>
  </div>

</div>

<script>
  const userId = localStorage.getItem("userId") || Date.now().toString();
  localStorage.setItem("userId", userId);

  document.getElementById("input").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  async function send() {
    const input   = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    const typingRow = addTypingIndicator();

    try {
      const res = await fetch("https://ai-support-chatbot-ql1c.onrender.com/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, userId })
      });

      const data = await res.json();

      setTimeout(() => {
        typingRow.remove();
        addMessage(data.reply, "bot");
        sendBtn.disabled = false;
      }, 800);

    } catch (err) {
      setTimeout(() => {
        typingRow.remove();
        addMessage("Sorry, I couldn't reach the server. Please try again.", "bot");
        sendBtn.disabled = false;
      }, 800);
    }
  }

  function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");

    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const row = document.createElement("div");
    row.classList.add("message-row", sender);

    if (sender === "bot") {
      const inner = document.createElement("div");
      inner.classList.add("bot-row-inner");

      const avatar = document.createElement("div");
      avatar.classList.add("bot-avatar");
      avatar.textContent = "🤖";

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;

      inner.appendChild(avatar);
      inner.appendChild(bubble);
      row.appendChild(inner);
    } else {
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.textContent = text;
      row.appendChild(bubble);
    }

    const ts = document.createElement("span");
    ts.classList.add("timestamp");
    ts.textContent = timeStr;
    row.appendChild(ts);

    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    return row;
  }

  function addTypingIndicator() {
    const chatBox = document.getElementById("chat-box");

    const row = document.createElement("div");
    row.classList.add("message-row", "bot");

    const inner = document.createElement("div");
    inner.classList.add("bot-row-inner");

    const avatar = document.createElement("div");
    avatar.classList.add("bot-avatar");
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble", "typing-bubble");

    for (let i = 0; i < 3; i++) {
      bubble.appendChild(document.createElement("span"));
    }

    inner.appendChild(avatar);
    inner.appendChild(bubble);
    row.appendChild(inner);

    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;

    return row;
  }
</script>

</body>
</html>
