<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .chat {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .user {
      color: blue;
    }
    .bot {
      color: green;
    }
  </style>
</head>
<body>

<h1>Admin Panel</h1>
<div id="chats"></div>

<script>
async function loadChats() {
  const res = await fetch("https://ai-support-chatbot-ql1c.onrender.com/admin/chats");
  const data = await res.json();

  const container = document.getElementById("chats");
  container.innerHTML = "";

  data.forEach(chat => {
    const div = document.createElement("div");
    div.className = "chat";

    div.innerHTML = `<h3>User: ${chat.userId}</h3>`;

    chat.messages.forEach(msg => {
      const p = document.createElement("p");
      p.className = msg.role === "user" ? "user" : "bot";
      p.innerText = `${msg.role}: ${msg.content}`;
      div.appendChild(p);
    });

    container.appendChild(div);
  });
}

loadChats();
</script>

</body>
</html>
