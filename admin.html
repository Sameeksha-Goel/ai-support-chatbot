<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #search {
      padding: 8px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      width: 300px;
      outline: none;
    }

    #search:focus {
      border-color: #6c5ce7;
    }

    button {
      padding: 8px 16px;
      background: #6c5ce7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-box {
      background: white;
      padding: 15px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 700px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .user {
      color: #6c5ce7;
      font-weight: bold;
    }

    .bot {
      color: #00b894;
    }
  </style>
</head>
<body>

<h1>Admin Panel</h1>

<div class="controls">
  <input id="search" placeholder="Search user ID..." oninput="filterChats()" />
  <button onclick="location.reload()">Refresh</button>
</div>

<div id="chatContainer"></div>

<script>
  let allChats = [];

  fetch("https://ai-support-chatbot-ql1c.onrender.com/admin/chats")
    .then(res => res.json())
    .then(data => {
      allChats = data;
      displayChats(data);
    });

  function displayChats(chats) {
    const container = document.getElementById("chatContainer");
    container.innerHTML = "";

    chats.forEach(chat => {
      const div = document.createElement("div");
      div.className = "chat-box";

      div.innerHTML = `<h3>User ID: ${chat.userId}</h3><hr>`;

      chat.messages.forEach(msg => {
        const p = document.createElement("p");

        if (msg.role === "user") {
          p.innerHTML = `<span class="user">User:</span> ${msg.content}`;
        } else {
          p.innerHTML = `<span class="bot">Bot:</span> ${msg.content}`;
        }

        if (msg.timestamp) {
          const time = document.createElement("small");
          time.style.color = "#aaa";
          time.style.marginLeft = "8px";
          time.textContent = new Date(msg.timestamp).toLocaleTimeString();
          p.appendChild(time);
        }

        div.appendChild(p);
      });

      container.appendChild(div);
    });
  }

  function filterChats() {
    const value = document.getElementById("search").value.toLowerCase();

    const filtered = allChats.filter(chat =>
      chat.userId.toLowerCase().includes(value)
    );

    displayChats(filtered);
  }
</script>

</body>
</html>
