<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .chat-box {
      background: white;
      padding: 15px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 700px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .user {
      color: #6c5ce7;
      font-weight: bold;
    }

    .bot {
      color: #00b894;
    }
  </style>
</head>
<body>

<h1>Admin Panel</h1>
<button onclick="location.reload()">Refresh</button>
<div id="chats"></div>

<script>
async function loadChats() {
  const res = await fetch("https://ai-support-chatbot-ql1c.onrender.com/admin/chats");
  const data = await res.json();

  const container = document.getElementById("chats");
  container.innerHTML = "";

  data.forEach(chat => {
    const div = document.createElement("div");
    div.className = "chat-box";

    div.innerHTML = `<h3>User ID: ${chat.userId}</h3><hr>`;

    chat.messages.forEach(msg => {
      const p = document.createElement("p");

      if (msg.role === "user") {
        p.innerHTML = `<span class="user">User:</span> ${msg.content}`;
      } else {
        p.innerHTML = `<span class="bot">Bot:</span> ${msg.content}`;
      }

      if (msg.timestamp) {
        const time = document.createElement("small");
        time.style.color = "#aaa";
        time.style.marginLeft = "8px";
        time.textContent = new Date(msg.timestamp).toLocaleTimeString();
        p.appendChild(time);
      }

      div.appendChild(p);
    });

    container.appendChild(div);
  });
}

loadChats();
</script>

</body>
</html>
