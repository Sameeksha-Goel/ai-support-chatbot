<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px 20px;
    }

    /* ── Header ── */
    .admin-header {
      max-width: 860px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #c9b800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #0a0a0a;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }

    #stats {
      font-size: 13px;
      color: #c9b800;
      background: rgba(201,184,0,0.1);
      border: 1px solid rgba(201,184,0,0.2);
      padding: 6px 14px;
      border-radius: 20px;
    }

    /* ── Controls ── */
    .controls {
      max-width: 860px;
      margin: 0 auto 24px;
      display: flex;
      gap: 10px;
    }

    #search {
      flex: 1;
      padding: 10px 18px;
      background: #1a1a1a;
      border: 1.5px solid #242424;
      border-radius: 10px;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: #e0e0e0;
      transition: border-color 0.18s;
    }

    #search:focus { border-color: #c9b800; }
    #search::placeholder { color: #444; }

    .refresh-btn {
      padding: 10px 20px;
      background: #c9b800;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: opacity 0.15s, transform 0.15s;
    }

    .refresh-btn:hover { opacity: 0.88; transform: scale(1.02); }

    /* ── Chat Card ── */
    .chat-card {
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 20px;
      margin: 0 auto 16px;
      max-width: 860px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .chat-card:hover {
      border-color: #2a2a2a;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .user-id {
      font-size: 11px;
      font-weight: 700;
      color: #c9b800;
      background: rgba(201,184,0,0.08);
      border: 1px solid rgba(201,184,0,0.2);
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.03em;
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .msg-badge {
      font-size: 10px;
      font-weight: 700;
      color: #888;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .last-preview {
      font-size: 14px;
      font-weight: 500;
      color: #bbb;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .last-preview strong { color: #c9b800; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px; }

    /* ── Messages ── */
    .messages { display: flex; flex-direction: column; gap: 6px; }

    .msg {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.5;
    }

    .msg-role {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .msg.user-msg .msg-role {
      background: rgba(201,184,0,0.15);
      color: #c9b800;
    }

    .msg.bot-msg .msg-role {
      background: rgba(74,222,128,0.1);
      color: #4ade80;
    }

    .msg-content { color: #ccc; }

    .msg-time {
      font-size: 10px;
      color: #333;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── Delete Button ── */
    .delete-btn {
      margin-top: 12px;
      padding: 7px 14px;
      background: rgba(255,77,77,0.1);
      color: #ff4d4d;
      border: 1px solid rgba(255,77,77,0.2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      opacity: 0.7;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }

    .chat-card:hover .delete-btn { opacity: 1; }

    .delete-btn:hover {
      background: rgba(255,77,77,0.2);
      border-color: rgba(255,77,77,0.4);
    }

    .empty-state {
      text-align: center;
      color: #333;
      padding: 60px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="header-left">
      <div class="brand-icon">A</div>
      <h1>Admin Panel</h1>
    </div>
    <span id="stats"></span>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search by user ID..." oninput="filterChats()" />
    <button class="refresh-btn" onclick="location.reload()">↺ Refresh</button>
  </div>

  <div id="chatContainer"></div>

<script>
  let allChats = [];

  fetch("https://ai-support-chatbot-ql1c.onrender.com/admin/chats")
    .then(res => res.json())
    .then(data => {
      allChats = data;
      displayChats(data);
      document.getElementById("stats").textContent =
        `${data.length} Conversation${data.length !== 1 ? "s" : ""}`;
    });

  function displayChats(chats) {
    const container = document.getElementById("chatContainer");
    container.innerHTML = "";

    if (chats.length === 0) {
      container.innerHTML = `<div class="empty-state">No conversations found</div>`;
      return;
    }

    chats.forEach(chat => {
      const card = document.createElement("div");
      card.className = "chat-card";

      const lastMsg = chat.messages[chat.messages.length - 1];

      card.innerHTML = `
        <div class="card-header">
          <span class="user-id">${chat.userId}</span>
          <div class="card-meta">
            <span class="msg-badge">${chat.messages.length} msgs</span>
          </div>
        </div>
        <div class="last-preview">
          <strong>Last</strong>${lastMsg ? lastMsg.content : "No messages"}
        </div>
        <div class="messages" id="msgs-${chat._id}"></div>
        <button class="delete-btn" onclick="deleteChat('${chat._id}')">Delete Chat</button>
      `;

      const msgsDiv = card.querySelector(`#msgs-${chat._id}`);

      chat.messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = `msg ${msg.role === "user" ? "user-msg" : "bot-msg"}`;

        const timeStr = msg.timestamp
          ? new Date(msg.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
          : "";

        div.innerHTML = `
          <span class="msg-role">${msg.role === "user" ? "User" : "Bot"}</span>
          <span class="msg-content">${msg.content}</span>
          ${timeStr ? `<span class="msg-time">${timeStr}</span>` : ""}
        `;

        msgsDiv.appendChild(div);
      });

      container.appendChild(card);
    });
  }

  function filterChats() {
    const value = document.getElementById("search").value.toLowerCase();
    displayChats(allChats.filter(c => c.userId.toLowerCase().includes(value)));
  }

  function deleteChat(id) {
    if (!confirm("Are you sure you want to delete this chat?")) return;

    fetch(`https://ai-support-chatbot-ql1c.onrender.com/admin/chats/${id}`, {
      method: "DELETE"
    }).then(() => {
      alert("Chat deleted");
      location.reload();
    });
  }
</script>

</body>
</html>
