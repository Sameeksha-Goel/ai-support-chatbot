<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: #c9b800; display: flex; align-items: center;
      justify-content: center; font-size: 20px; font-weight: 900; color: #0a0a0a;
    }

    h1 { font-size: 20px; font-weight: 800; color: #fff; }

    label {
      display: block;
      font-size: 12px; font-weight: 700; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1.5px solid #242424;
      border-radius: 10px;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      color: #e0e0e0;
      transition: border-color 0.18s;
      margin-bottom: 18px;
    }

    input:focus { border-color: #c9b800; }
    input::placeholder { color: #444; }

    .error {
      font-size: 13px; color: #ff4d4d;
      background: rgba(255,77,77,0.08);
      border: 1px solid rgba(255,77,77,0.2);
      border-radius: 8px; padding: 10px 14px;
      margin-bottom: 18px; display: none;
    }

    button[type="submit"] {
      width: 100%; padding: 13px;
      background: #c9b800; color: #0a0a0a;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: opacity 0.15s;
    }

    button[type="submit"]:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">A</div>
      <h1>Admin Login</h1>
    </div>

    <form method="POST" action="/login">
      <div id="error-msg" class="error">Incorrect username or password.</div>

      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit">Sign In</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get("error")) {
      document.getElementById("error-msg").style.display = "block";
    }
  </script>
</body>
</html>
